<!DOCTYPE html>
<html>
<head>
  <title>Poker Payout Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1100px; margin: 40px auto; padding: 20px; }
    label { display:block; margin-top:12px; font-weight:bold; }
    input { padding:8px; width:220px; margin-top:4px; }
    button { margin-top:20px; padding:10px 18px; font-size:16px; cursor:pointer; }
    .box { margin-top:25px; padding:15px; background:#f7f7f7; border:1px solid #ddd; }
    table { border-collapse:collapse; margin-top:25px; width:100%; }
    th, td { border:1px solid #ccc; padding:10px; text-align:right; }
    th { background:#f2f2f2; }
    .success { color:green; font-weight:bold; }
    .error { color:#b00020; font-weight:bold; }
  </style>
</head>

<body>

<h1>Poker Tournament Payout Calculator</h1>

<label>Number of Entries</label>
<input type="number" id="entries" value="100">

<label>Total Buy-In</label>
<input type="number" id="buyIn" value="125">

<label>Amount Going to Prize Pool</label>
<input type="number" id="prizePoolAmount" value="95">

<label>Percent of Field Paid</label>
<input type="number" id="percentPaid" value="12">

<label>Minimum Cash Multiplier</label>
<input type="number" id="minCashMultiplier" value="2">

<br>
<button onclick="calculatePayouts()">Calculate Payouts</button>

<div id="summary" class="box"></div>
<div id="validation" class="box"></div>
<div id="results"></div>

<script>
function calculatePayouts() {
  const t = getTournament();

  if (t.entries <= 0 || t.buyIn <= 0 || t.prizePoolAmount <= 0 || t.percentPaid <= 0) {
    showError("Please enter valid positive numbers.");
    return;
  }

  if (t.paidPlaces * t.minCash > t.prizePool) {
    showError("Prize pool is too small for this minimum cash structure.");
    return;
  }

  const bands = generateBands(t.paidPlaces);
  const payouts = buildPayouts(bands, t);

  displaySummary(t);
  validateAndDisplay(payouts, t);
  displayPayouts(payouts, t);
}

function getTournament() {
  const entries = Number(document.getElementById("entries").value);
  const buyIn = Number(document.getElementById("buyIn").value);
  const prizePoolAmount = Number(document.getElementById("prizePoolAmount").value);
  const percentPaid = Number(document.getElementById("percentPaid").value);
  const minCashMultiplier = Number(document.getElementById("minCashMultiplier").value);

  return {
    entries,
    buyIn,
    prizePoolAmount,
    percentPaid,
    minCashMultiplier,
    prizePool: Math.round(entries * prizePoolAmount),
    paidPlaces: Math.ceil(entries * (percentPaid / 100)),
    minCash: Math.round(buyIn * minCashMultiplier)
  };
}

function generateBands(paidPlaces) {
  const bands = [];

  for (let place = 1; place <= Math.min(9, paidPlaces); place++) {
    bands.push({ startPlace: place, endPlace: place, count: 1 });
  }

  if (paidPlaces <= 9) return bands;

  const ratios = paidPlaces >= 100
    ? [0.031, 0.039, 0.050, 0.064, 0.081, 0.108, 0.125, 0.150, 0.183, 0.228, 0.286, 0.364, 0.464, 0.594, 0.767, 1.000]
    : getSmallFieldRatios(paidPlaces);

  let start = 10;

  ratios.forEach(ratio => {
    if (start > paidPlaces) return;

    let end = Math.round(paidPlaces * ratio);
    end = Math.max(start, Math.min(end, paidPlaces));

    bands.push({
      startPlace: start,
      endPlace: end,
      count: end - start + 1
    });

    start = end + 1;
  });

  return bands;
}

function getSmallFieldRatios(paidPlaces) {
  if (paidPlaces <= 12) return [1.000];
  if (paidPlaces <= 24) return [0.50, 0.65, 0.82, 1.000];
  if (paidPlaces <= 60) return [0.25, 0.35, 0.50, 0.67, 0.83, 1.000];
  return [0.18, 0.25, 0.35, 0.50, 0.67, 0.83, 1.000];
}

function buildPayouts(bands, t) {
  if (isApproved100EntryBaseline(t)) {
    return getApproved100EntryBaseline();
  }

  const payouts = bands.map(band => ({ ...band, amount: t.minCash }));
  const bottomIndex = payouts.length - 1;

  const jumpCount = payouts.length - 1;
  const weights = [];

  for (let i = 1; i <= jumpCount; i++) {
    weights.push(Math.pow(i, getJumpPower(t.entries)));
  }

  const extraPool = t.prizePool - (t.paidPlaces * t.minCash);

  let weightedTotal = 0;

  for (let jumpIndex = 0; jumpIndex < jumpCount; jumpIndex++) {
    const playersAbove = getPlayersAboveJump(bands, jumpIndex);
    weightedTotal += weights[jumpIndex] * playersAbove;
  }

  const scale = extraPool / weightedTotal;

  const jumps = weights.map(weight => Math.max(
    getMinimumVisibleJump(t.entries),
    Math.round(weight * scale)
  ));

  payouts[bottomIndex].amount = t.minCash;

  let currentAmount = t.minCash;

  for (let i = bottomIndex - 1; i >= 0; i--) {
    const jumpIndex = bottomIndex - i - 1;
    currentAmount += jumps[jumpIndex];
    payouts[i].amount = currentAmount;
  }

  balanceFinalTotalWithoutBreakingShape(payouts, t);

  return payouts;
}

function balanceFinalTotalWithoutBreakingShape(payouts, t) {
  let diff = t.prizePool - getTotalPaid(payouts);

  // Small final correction goes into 1st place.
  payouts[0].amount += diff;

  // If 1st-to-2nd jump becomes too small, repair it.
  const jumpToFirst = payouts[0].amount - payouts[1].amount;
  const jumpToSecond = payouts[1].amount - payouts[2].amount;

  if (jumpToFirst <= jumpToSecond) {
    const needed = jumpToSecond - jumpToFirst + getMinimumVisibleJump(t.entries);
    payouts[0].amount += needed;
    payouts[1].amount -= needed;
  }

  // Final exact correction.
  diff = t.prizePool - getTotalPaid(payouts);
  payouts[0].amount += diff;
}

function getJumpPower(entries) {
  if (entries <= 100) return 1.55;
  if (entries <= 250) return 1.45;
  if (entries <= 500) return 1.35;
  if (entries <= 1000) return 1.25;
  if (entries <= 3000) return 1.15;
  return 1.10;
}

function getMinimumVisibleJump(entries) {
  if (entries <= 100) return 1;
  if (entries <= 250) return 10;
  if (entries <= 500) return 20;
  if (entries <= 1000) return 35;
  if (entries <= 3000) return 50;
  return 75;
}

function isApproved100EntryBaseline(t) {
  return (
    t.entries === 100 &&
    t.buyIn === 125 &&
    t.prizePoolAmount === 95 &&
    t.paidPlaces === 12 &&
    t.minCash === 250
  );
}

function getApproved100EntryBaseline() {
  return [
    { startPlace: 1, endPlace: 1, count: 1, amount: 2085 },
    { startPlace: 2, endPlace: 2, count: 1, amount: 1616 },
    { startPlace: 3, endPlace: 3, count: 1, amount: 1341 },
    { startPlace: 4, endPlace: 4, count: 1, amount: 1091 },
    { startPlace: 5, endPlace: 5, count: 1, amount: 866 },
    { startPlace: 6, endPlace: 6, count: 1, amount: 661 },
    { startPlace: 7, endPlace: 7, count: 1, amount: 470 },
    { startPlace: 8, endPlace: 8, count: 1, amount: 335 },
    { startPlace: 9, endPlace: 9, count: 1, amount: 285 },
    { startPlace: 10, endPlace: 12, count: 3, amount: 250 }
  ];
}

function buildProgressiveJumps(bands, t, firstAmount) {
  const jumpCount = bands.length - 1;
  const topExtra = firstAmount - t.minCash;

  if (jumpCount <= 0 || topExtra <= 0) return [];

  const targetExtraPool = t.prizePool - (t.paidPlaces * t.minCash);
  const power = findJumpPower(bands, topExtra, targetExtraPool);

  const rawWeights = [];

  for (let i = 0; i < jumpCount; i++) {
    const progress = (i + 1) / jumpCount;
    rawWeights.push(Math.pow(progress, power));
  }

  const weightTotal = rawWeights.reduce((sum, weight) => sum + weight, 0);
  const scale = topExtra / weightTotal;

  return rawWeights.map(weight => Math.max(1, Math.round(weight * scale)));
}

function findJumpPower(bands, topExtra, targetExtraPool) {
  let low = 0.05;
  let high = 8;

  for (let i = 0; i < 80; i++) {
    const mid = (low + high) / 2;
    const estimated = estimateExtraFromPower(bands, topExtra, mid);

    if (estimated > targetExtraPool) {
      low = mid;
    } else {
      high = mid;
    }
  }

  return (low + high) / 2;
}

function estimateExtraFromPower(bands, topExtra, power) {
  const jumpCount = bands.length - 1;
  const weights = [];

  for (let i = 0; i < jumpCount; i++) {
    const progress = (i + 1) / jumpCount;
    weights.push(Math.pow(progress, power));
  }

  const weightTotal = weights.reduce((sum, weight) => sum + weight, 0);
  const scale = topExtra / weightTotal;

  let totalExtra = 0;

  for (let jumpIndex = 0; jumpIndex < jumpCount; jumpIndex++) {
    const jumpAmount = weights[jumpIndex] * scale;
    const playersAboveJump = getPlayersAboveJump(bands, jumpIndex);
    totalExtra += jumpAmount * playersAboveJump;
  }

  return totalExtra;
}

function getPlayersAboveJump(bands, bottomJumpIndex) {
  const bottomIndex = bands.length - 1;
  const firstAffectedBandIndex = bottomIndex - bottomJumpIndex - 1;

  let players = 0;

  for (let i = 0; i <= firstAffectedBandIndex; i++) {
    players += bands[i].count;
  }

  return players;
}

function applyJumpsToPayouts(payouts, jumps, t) {
  const bottomIndex = payouts.length - 1;
  payouts[bottomIndex].amount = t.minCash;

  let currentAmount = t.minCash;

  for (let i = bottomIndex - 1; i >= 0; i--) {
    const jumpIndex = bottomIndex - i - 1;
    currentAmount += jumps[jumpIndex] || 1;
    payouts[i].amount = currentAmount;
  }
}

function getFirstPlacePercent(entries) {
  if (entries <= 100) return 0.22;
  if (entries <= 500) return 0.20;
  if (entries <= 1000) return 0.18;
  if (entries <= 2500) return 0.17;
  if (entries <= 3500) return 0.16;
  return 0.155;
}

function repairOrder(payouts, t) {
  const jump = getMinimumVisibleJump(t.entries);

  payouts[payouts.length - 1].amount = t.minCash;

  for (let i = payouts.length - 2; i >= 0; i--) {
    if (payouts[i].amount < payouts[i + 1].amount + jump) {
      payouts[i].amount = payouts[i + 1].amount + jump;
    }
  }
}

function getMinimumVisibleJump(entries) {
  if (entries <= 100) return 1;
  if (entries <= 250) return 10;
  if (entries <= 500) return 25;
  if (entries <= 1000) return 50;
  if (entries <= 3000) return 75;
  return 100;
}

function balanceExactly(payouts, t) {
  let diff = t.prizePool - getTotalPaid(payouts);

  if (diff > 0) {
    diff = addDifference(payouts, t, diff);
  } else if (diff < 0) {
    diff = subtractDifference(payouts, t, diff);
  }

  if (diff !== 0) {
    payouts[0].amount += diff;
  }

  payouts[payouts.length - 1].amount = t.minCash;
}

function addDifference(payouts, t, diff) {
  const maxFirst = Math.round(t.prizePool * 0.22);

  if (payouts[0].amount < maxFirst) {
    const add = Math.min(diff, maxFirst - payouts[0].amount);
    payouts[0].amount += add;
    diff -= add;
  }

  for (let i = 1; i < payouts.length - 1 && diff > 0; i++) {
    const room = payouts[i - 1].amount - payouts[i].amount - 1;
    const addPerPlayer = Math.min(room, Math.floor(diff / payouts[i].count));

    if (addPerPlayer > 0) {
      payouts[i].amount += addPerPlayer;
      diff -= addPerPlayer * payouts[i].count;
    }
  }

  return diff;
}

function subtractDifference(payouts, t, diff) {
  let remaining = Math.abs(diff);

  for (let i = payouts.length - 2; i >= 1 && remaining > 0; i--) {
    const floor = Math.max(t.minCash, payouts[i + 1].amount + 1);
    const room = payouts[i].amount - floor;
    const subtractPerPlayer = Math.min(room, Math.ceil(remaining / payouts[i].count));

    if (subtractPerPlayer > 0) {
      payouts[i].amount -= subtractPerPlayer;
      remaining -= subtractPerPlayer * payouts[i].count;
    }
  }

  if (remaining > 0) {
    const minFirst = payouts.length > 1 ? payouts[1].amount + 1 : t.minCash;
    const room = payouts[0].amount - minFirst;
    const subtract = Math.min(room, remaining);

    if (subtract > 0) {
      payouts[0].amount -= subtract;
      remaining -= subtract;
    }
  }

  return -remaining;
}

function validateAndDisplay(payouts, t) {
  const errors = [];
  const totalPaid = getTotalPaid(payouts);

  if (totalPaid !== t.prizePool) {
    errors.push(`Total paid is $${totalPaid.toLocaleString()}, but prize pool is $${t.prizePool.toLocaleString()}.`);
  }

  if (payouts[payouts.length - 1].amount !== t.minCash) {
    errors.push(`Minimum cash should be $${t.minCash.toLocaleString()}.`);
  }

  if (payouts[0].amount > Math.round(t.prizePool * 0.22)) {
    errors.push(`1st place is above the 22% cap.`);
  }

  for (let i = 0; i < payouts.length - 1; i++) {
    if (payouts[i].amount <= payouts[i + 1].amount) {
      errors.push(`${formatRange(payouts[i])} should pay more than ${formatRange(payouts[i + 1])}.`);
      break;
    }
  }

  document.getElementById("validation").innerHTML = errors.length === 0
    ? `<p class="success">Validation passed: payout table is balanced.</p>`
    : `<p class="error">Validation issues:</p><ul>${errors.map(e => `<li>${e}</li>`).join("")}</ul>`;
}

function displaySummary(t) {
  document.getElementById("summary").innerHTML = `
    <h2>Summary</h2>
    <p><strong>Entries:</strong> ${t.entries.toLocaleString()}</p>
    <p><strong>Buy-In:</strong> $${t.buyIn.toLocaleString()}</p>
    <p><strong>Prize Pool Contribution:</strong> $${t.prizePoolAmount.toLocaleString()}</p>
    <p><strong>Total Prize Pool:</strong> $${t.prizePool.toLocaleString()}</p>
    <p><strong>Places Paid:</strong> ${t.paidPlaces.toLocaleString()}</p>
    <p><strong>Minimum Cash:</strong> $${t.minCash.toLocaleString()}</p>
    <p><strong>1st Place Max:</strong> 22.0%</p>
  `;
}

function displayPayouts(payouts, t) {
  let html = `
    <table>
      <thead>
        <tr>
          <th>Place(s)</th>
          <th>Payout</th>
          <th>% of Prize Pool</th>
          <th>Players</th>
          <th>Total Paid for Band</th>
        </tr>
      </thead>
      <tbody>
  `;

  payouts.forEach(payout => {
    const percent = ((payout.amount / t.prizePool) * 100).toFixed(2);

    html += `
      <tr>
        <td>${formatRange(payout)}</td>
        <td>$${payout.amount.toLocaleString()}</td>
        <td>${percent}%</td>
        <td>${payout.count}</td>
        <td>$${(payout.amount * payout.count).toLocaleString()}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  document.getElementById("results").innerHTML = html;
}

function getTotalPaid(payouts) {
  return payouts.reduce((sum, payout) => sum + payout.amount * payout.count, 0);
}

function formatRange(payout) {
  if (payout.startPlace === payout.endPlace) return formatPlace(payout.startPlace);
  return `${formatPlace(payout.startPlace)}-${formatPlace(payout.endPlace)}`;
}

function formatPlace(place) {
  if (place === 1) return "1st";
  if (place === 2) return "2nd";
  if (place === 3) return "3rd";
  return place + "th";
}

function showError(message) {
  document.getElementById("summary").innerHTML = "";
  document.getElementById("results").innerHTML = "";
  document.getElementById("validation").innerHTML = `<p class="error">${message}</p>`;
}

calculatePayouts();
</script>

</body>
</html>
